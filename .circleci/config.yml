version: 2.1

# ──────────────────────────────────────────────────────────────────────────
# Pipeline CI — CircleCI
#
# Responsabilità:
#   CircleCI  → esegue i test su ogni push/PR
#   Vercel    → deploya il frontend automaticamente ad ogni push su main
#   Render    → deploya il backend automaticamente ad ogni push su main
#
# Nessuna variabile d'ambiente richiesta per i test.
# ──────────────────────────────────────────────────────────────────────────

jobs:

  test-frontend:
    docker:
      - image: cimg/node:22.12
    steps:
      - checkout

      - restore_cache:
          keys:
            - npm-v1-{{ checksum "frontend/package-lock.json" }}
            - npm-v1-

      - run:
          name: Install dependencies
          working_directory: frontend
          command: npm ci

      - save_cache:
          key: npm-v1-{{ checksum "frontend/package-lock.json" }}
          paths:
            - frontend/node_modules

      - run:
          name: TypeScript check
          working_directory: frontend
          command: npx tsc --noEmit

      - run:
          name: Lint
          working_directory: frontend
          command: npm run lint

      - run:
          name: Build
          working_directory: frontend
          command: npm run build

  test-backend:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout

      - restore_cache:
          keys:
            - pip-v1-{{ checksum "backend/requirements.txt" }}
            - pip-v1-

      - run:
          name: Install dependencies
          working_directory: backend
          command: pip install -r requirements.txt

      - save_cache:
          key: pip-v1-{{ checksum "backend/requirements.txt" }}
          paths:
            - ~/.local/lib/python3.12/site-packages

      - run:
          name: Run pytest
          working_directory: backend
          command: python -m pytest -v --tb=short

workflows:
  ci:
    jobs:
      - test-frontend
      - test-backend
