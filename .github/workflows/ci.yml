name: CI / CD

# ──────────────────────────────────────────────────────────────────────────
# Triggers
#   • Every push to main  → quality gates + deploy
#   • Every PR to main    → quality gates only  (deploy jobs are skipped)
# ──────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any previous run for the same branch / PR when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────────────────────────────────
# Required GitHub Secrets  (Settings → Secrets and variables → Actions)
#
#   VERCEL_TOKEN        – Personal access token from vercel.com/account/tokens
#   VERCEL_ORG_ID       – Found in vercel.com → Team Settings → General
#   VERCEL_PROJECT_ID   – Found in vercel.com → Project Settings → General
#   RENDER_DEPLOY_HOOK_URL – Found in Render → Service → Settings → Deploy Hook
#
# Required GitHub Variables  (Settings → Secrets and variables → Variables)
#
#   VITE_API_URL        – Production backend URL, e.g. https://api.myapp.onrender.com
# ──────────────────────────────────────────────────────────────────────────

jobs:

  # ══════════════════════════════════════════════════════════════════════
  # QUALITY GATES  —  run on every push and every PR
  # ══════════════════════════════════════════════════════════════════════

  test-frontend:
    name: "🎨 Frontend — TypeScript · Lint · Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Production build
        run: npm run build
        env:
          # Use the repository variable if set, fall back to empty string
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist/
          retention-days: 3

  # ──────────────────────────────────────────────────────────────────────

  test-backend:
    name: "🐍 Backend — Pytest"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -v --tb=short

      - name: Upload pytest cache
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ github.sha }}
          path: backend/.pytest_cache/
          retention-days: 3

  # ══════════════════════════════════════════════════════════════════════
  # DEPLOY  —  push to main only, after quality gates pass
  # ══════════════════════════════════════════════════════════════════════

  deploy-frontend:
    name: "🚀 Deploy Frontend → Vercel"
    runs-on: ubuntu-latest
    needs: [test-frontend]
    # Only runs on push to main, never on PRs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production-frontend
      url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Links the repo to the Vercel project and downloads env variables
      - name: Pull Vercel project settings
        working-directory: frontend
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Builds into .vercel/output/ (used by --prebuilt in the next step)
      - name: Build via Vercel CLI
        working-directory: frontend
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      # Uploads the pre-built output; Vercel does not rebuild server-side
      - name: Deploy to Vercel production
        id: deploy
        working-directory: frontend
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment-url=$URL" >> "$GITHUB_OUTPUT"
          echo "✅ Frontend deployed → $URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ──────────────────────────────────────────────────────────────────────

  deploy-backend:
    name: "🐳 Deploy Backend → GHCR + Render"
    runs-on: ubuntu-latest
    needs: [test-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production-backend
    permissions:
      contents: read
      packages: write   # required to push images to GitHub Container Registry

    steps:
      - uses: actions/checkout@v4

      # Multi-platform builder (amd64 + arm64 for Render/M-series compatibility)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GITHUB_TOKEN is automatically provided — no extra secret needed
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generates tags: latest + sha-<short-commit>
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/security-dashboard-backend
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      # Build and push; uses GitHub Actions cache to speed up layer reuse
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Render watches the GHCR image and redeploys on new pushes,
      # OR you can trigger a manual deploy via the deploy hook URL.
      - name: Trigger Render deploy hook
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Render webhook response: HTTP $HTTP_STATUS"
          if [[ "$HTTP_STATUS" -lt 200 || "$HTTP_STATUS" -ge 300 ]]; then
            echo "❌ Render deploy hook returned unexpected status $HTTP_STATUS"
            exit 1
          fi
          echo "✅ Render deploy triggered successfully"
